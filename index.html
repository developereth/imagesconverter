<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#1e3c72">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>ULTIMATE PDF Converter - Addis Power Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #333;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #dc3545;
            margin-bottom: 15px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .offline-badge {
            text-align: center;
            background: #28a745;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            display: inline-block;
            width: auto;
            margin: 0 auto 15px;
        }

        .upload-area {
            border: 2px dashed #2a5298;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            background: #fafafa;
            margin-bottom: 15px;
            touch-action: manipulation;
        }

        .upload-area:active {
            transform: scale(0.98);
        }

        #fileInput {
            display: none;
        }

        .advanced-panel {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .panel-title {
            font-weight: bold;
            margin-bottom: 12px;
            color: #1e3c72;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
        }

        .control-group {
            background: white;
            padding: 10px;
            border-radius: 10px;
        }

        .control-group label {
            display: block;
            font-weight: bold;
            font-size: 0.75rem;
            margin-bottom: 5px;
        }

        .control-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.8rem;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .preview-item {
            position: relative;
            border: 2px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }

        .preview-img {
            width: 100%;
            height: 100px;
            object-fit: contain;
            background: #f0f0f0;
        }

        .remove-btn {
            position: absolute;
            top: 3px;
            right: 3px;
            background: red;
            color: white;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            cursor: pointer;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .clear-btn {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
        }

        .status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            display: none;
            font-size: 0.8rem;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .file-info {
            text-align: center;
            font-size: 0.7rem;
            color: #666;
            margin: 10px 0;
        }

        .progress-bar {
            width: 100%;
            height: 25px;
            background: #e0e0e0;
            border-radius: 12px;
            overflow: hidden;
            margin: 10px 0;
            display: none;
        }

        .progress-bar.show {
            display: block;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #28a745 0%, #20c997 100%);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.7rem;
        }

        .footer {
            margin-top: 20px;
            padding: 12px;
            text-align: center;
            border-top: 1px solid #ddd;
            font-size: 0.7rem;
        }

        .footer a {
            color: #2a5298;
            text-decoration: none;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            .controls-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 ULTIMATE PDF CONVERTER</h1>
        <div class="subtitle">🔴 Professional Quality | ourbook 911573334</div>
        <div style="text-align: center;">
            <div class="offline-badge">✅ FULLY OFFLINE | SELECT FROM GALLERY</div>
        </div>
        
        <div class="upload-area" id="uploadArea">
            <p>📁 Tap to Select Images</p>
            <small>Choose from Gallery, Files, or take photo with Camera</small>
        </div>
        
        <!-- FIXED: Removed 'capture' attribute - now shows file picker instead of forcing camera -->
        <input type="file" id="fileInput" multiple accept="image/*">
        
        <div class="advanced-panel">
            <div class="panel-title">⚙️ PROFESSIONAL CONTROLS</div>
            <div class="controls-grid">
                <div class="control-group">
                    <label>📄 Page Size</label>
                    <select id="pageSize">
                        <option value="image">Match Image Size</option>
                        <option value="a4">A4</option>
                        <option value="letter">Letter</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label>🎨 Quality</label>
                    <select id="qualityMode">
                        <option value="maximum">100% Maximum</option>
                        <option value="high">95% High</option>
                        <option value="professional">90% Professional</option>
                        <option value="standard">80% Standard</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label>📐 DPI</label>
                    <select id="dpiSetting">
                        <option value="300">300 DPI (Print)</option>
                        <option value="200">200 DPI (Good)</option>
                        <option value="96">96 DPI (Web)</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label>🔴 Watermark</label>
                    <input type="text" id="watermarkText" value="ourbook 911573334" style="width:100%; padding:6px;">
                </div>
                
                <div class="control-group">
                    <label>📍 Position</label>
                    <select id="watermarkPosition">
                        <option value="bottom-right">Bottom Right</option>
                        <option value="bottom-left">Bottom Left</option>
                        <option value="none">No Watermark</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div class="preview-grid" id="preview"></div>
        
        <div class="button-group">
            <button class="clear-btn" id="clearBtn">Clear All 🗑️</button>
            <button id="convertBtn">✨ Create Professional PDF</button>
        </div>
        
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill">0%</div>
        </div>
        
        <div class="status" id="status"></div>
        <div class="file-info" id="fileInfo"></div>
        
        <div class="footer">
            <a href="https://addispower.pages.dev/" target="_blank">🌐 Addis Power</a> | 
            <span>Professional PDF Converter</span> |
            <span>🔴 ourbook 911573334</span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        let selectedFiles = [];
        
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewGrid = document.getElementById('preview');
        const convertBtn = document.getElementById('convertBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusDiv = document.getElementById('status');
        const fileInfo = document.getElementById('fileInfo');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const pageSizeSelect = document.getElementById('pageSize');
        const qualityModeSelect = document.getElementById('qualityMode');
        const dpiSettingSelect = document.getElementById('dpiSetting');
        const watermarkTextInput = document.getElementById('watermarkText');
        const watermarkPositionSelect = document.getElementById('watermarkPosition');
        
        const qualityMap = { maximum: 1.0, high: 0.95, professional: 0.9, standard: 0.8 };
        
        uploadArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFiles(Array.from(e.target.files)));
        clearBtn.addEventListener('click', clearAll);
        convertBtn.addEventListener('click', convertToPDF);
        
        function handleFiles(files) {
            if (files.length === 0) return;
            const imageFiles = files.filter(f => f.type.startsWith('image/'));
            if (imageFiles.length === 0) {
                showStatus('Please select images', 'error');
                return;
            }
            imageFiles.forEach(file => {
                if (!selectedFiles.some(existing => existing.name === file.name)) {
                    selectedFiles.push(file);
                }
            });
            updatePreview();
            updateFileInfo();
            showStatus(`Added ${imageFiles.length} image(s)`, 'success');
        }
        
        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updatePreview();
            updateFileInfo();
        }
        
        function clearAll() {
            if (selectedFiles.length > 0 && confirm('Clear all images?')) {
                selectedFiles = [];
                updatePreview();
                updateFileInfo();
                showStatus('Cleared', 'info');
            }
        }
        
        function updatePreview() {
            if (selectedFiles.length === 0) {
                previewGrid.innerHTML = '<div style="text-align: center; padding: 20px; color: #999;">No images selected. Tap to add images from gallery!</div>';
                return;
            }
            previewGrid.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const previewItem = document.createElement('div');
                previewItem.className = 'preview-item';
                const img = document.createElement('img');
                img.className = 'preview-img';
                img.src = URL.createObjectURL(file);
                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-btn';
                removeBtn.innerHTML = '×';
                removeBtn.onclick = () => removeFile(index);
                previewItem.appendChild(img);
                previewItem.appendChild(removeBtn);
                previewGrid.appendChild(previewItem);
            });
        }
        
        function updateFileInfo() {
            if (selectedFiles.length === 0) {
                fileInfo.textContent = 'No images selected';
                return;
            }
            const totalSize = selectedFiles.reduce((sum, file) => sum + file.size, 0);
            const sizeMB = (totalSize / (1024 * 1024)).toFixed(2);
            fileInfo.textContent = `📊 ${selectedFiles.length} image(s) | 💾 ${sizeMB} MB`;
        }
        
        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type} show`;
            setTimeout(() => {
                statusDiv.classList.remove('show');
            }, 3000);
        }
        
        function updateProgress(percent, text) {
            progressBar.classList.add('show');
            progressFill.style.width = `${percent}%`;
            progressFill.textContent = text || `${percent}%`;
            if (percent >= 100) {
                setTimeout(() => {
                    progressBar.classList.remove('show');
                    progressFill.style.width = '0%';
                }, 1000);
            }
        }
        
        async function fileToBase64(file, quality) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    if (file.type === 'image/jpeg' && quality < 1) {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            canvas.width = img.width;
                            canvas.height = img.height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0);
                            canvas.toBlob((blob) => {
                                const r = new FileReader();
                                r.onloadend = () => resolve(r.result);
                                r.readAsDataURL(blob);
                            }, 'image/jpeg', quality);
                        };
                        img.src = e.target.result;
                    } else {
                        resolve(e.target.result);
                    }
                };
                reader.readAsDataURL(file);
            });
        }
        
        function addWatermark(pdf, pageWidth, pageHeight, text, position) {
            if (!text || text.trim() === '' || position === 'none') return;
            const fontSize = Math.max(6, Math.min(9, pageWidth / 55));
            pdf.setFontSize(fontSize);
            pdf.setTextColor(255, 0, 0);
            pdf.setGState(new pdf.GState({ opacity: 0.35 }));
            const padding = 8;
            const textWidth = pdf.getTextWidth(text);
            let x, y;
            if (position === 'bottom-right') {
                x = pageWidth - textWidth - padding;
                y = pageHeight - padding;
            } else if (position === 'bottom-left') {
                x = padding;
                y = pageHeight - padding;
            } else {
                return;
            }
            pdf.text(text, x, y);
        }
        
        async function convertToPDF() {
            if (selectedFiles.length === 0) {
                showStatus('Select images first', 'error');
                return;
            }
            convertBtn.disabled = true;
            showStatus('Creating professional PDF...', 'info');
            try {
                const { jsPDF } = jspdf;
                let pdf = null;
                let isFirstPage = true;
                const quality = qualityMap[qualityModeSelect.value];
                const targetDPI = parseInt(dpiSettingSelect.value);
                const watermarkText = watermarkTextInput.value;
                const watermarkPos = watermarkPositionSelect.value;
                
                for (let i = 0; i < selectedFiles.length; i++) {
                    const file = selectedFiles[i];
                    updateProgress(Math.round((i / selectedFiles.length) * 100), `${i+1}/${selectedFiles.length}`);
                    const base64 = await fileToBase64(file, quality);
                    const img = await new Promise((resolve) => {
                        const imgObj = new Image();
                        imgObj.onload = () => resolve(imgObj);
                        imgObj.src = base64;
                    });
                    
                    let pdfWidth, pdfHeight, imgWidth, imgHeight, x, y;
                    const pxToPoints = 72 / targetDPI;
                    pdfWidth = img.width * pxToPoints;
                    pdfHeight = img.height * pxToPoints;
                    imgWidth = pdfWidth;
                    imgHeight = pdfHeight;
                    x = 0;
                    y = 0;
                    
                    if (isFirstPage) {
                        pdf = new jsPDF({ unit: 'pt', format: [pdfWidth, pdfHeight], compress: false });
                        isFirstPage = false;
                    } else {
                        pdf.addPage([pdfWidth, pdfHeight], 'pt');
                    }
                    
                    const format = file.type === 'image/png' ? 'PNG' : 'JPEG';
                    pdf.addImage(base64, format, x, y, imgWidth, imgHeight);
                    addWatermark(pdf, pdfWidth, pdfHeight, watermarkText, watermarkPos);
                }
                
                updateProgress(100, 'Done!');
                const filename = `addispower-pdf-${Date.now()}.pdf`;
                pdf.save(filename);
                showStatus(`✅ PDF Created! ${selectedFiles.length} images | Watermark: ${watermarkText}`, 'success');
            } catch (error) {
                showStatus('Error: ' + error.message, 'error');
            } finally {
                convertBtn.disabled = false;
                setTimeout(() => progressBar.classList.remove('show'), 1000);
            }
        }
    </script>
</body>
</html>
