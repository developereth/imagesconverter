<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#1e3c72">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Professional PDF Converter - Addis Power</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #333;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #dc3545;
            margin-bottom: 15px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .offline-badge {
            text-align: center;
            background: #28a745;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            display: inline-block;
            width: auto;
            margin: 0 auto 15px;
        }

        .upload-area {
            border: 2px dashed #2a5298;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            background: #fafafa;
            margin-bottom: 15px;
            touch-action: manipulation;
        }

        .upload-area:active {
            transform: scale(0.98);
        }

        #fileInput {
            display: none;
        }

        .advanced-panel {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .panel-title {
            font-weight: bold;
            margin-bottom: 12px;
            color: #1e3c72;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }

        .control-group {
            background: white;
            padding: 10px;
            border-radius: 10px;
        }

        .control-group label {
            display: block;
            font-weight: bold;
            font-size: 0.75rem;
            margin-bottom: 5px;
        }

        .control-group select, .control-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.8rem;
        }

        .watermark-preview {
            margin-top: 5px;
            font-size: 0.65rem;
            color: #dc3545;
            text-align: center;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .preview-item {
            position: relative;
            border: 2px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }

        .preview-img {
            width: 100%;
            height: 100px;
            object-fit: contain;
            background: #f0f0f0;
        }

        .remove-btn {
            position: absolute;
            top: 3px;
            right: 3px;
            background: red;
            color: white;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            cursor: pointer;
            font-size: 14px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation;
        }

        button:active {
            transform: scale(0.97);
        }

        .clear-btn {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
        }

        .status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            display: none;
            font-size: 0.8rem;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .file-info {
            text-align: center;
            font-size: 0.7rem;
            color: #666;
            margin: 10px 0;
        }

        .progress-bar {
            width: 100%;
            height: 25px;
            background: #e0e0e0;
            border-radius: 12px;
            overflow: hidden;
            margin: 10px 0;
            display: none;
        }

        .progress-bar.show {
            display: block;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #28a745 0%, #20c997 100%);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.7rem;
        }

        /* Footer with your link */
        .footer {
            margin-top: 20px;
            padding: 12px;
            text-align: center;
            border-top: 1px solid #ddd;
            font-size: 0.7rem;
        }

        .footer a {
            color: #2a5298;
            text-decoration: none;
            font-weight: bold;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            .controls-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Professional PDF Converter</h1>
        <div class="subtitle">🔴 Small Red Watermark | Addis Power</div>
        <div style="text-align: center;">
            <div class="offline-badge">✅ FULL VERSION - Works Offline on Your Phone</div>
        </div>
        
        <div class="upload-area" id="uploadArea">
            <p>📁 Tap to Select Images</p>
            <small>Professional Quality • 300 DPI • CMYK • Saves to your phone</small>
        </div>
        <input type="file" id="fileInput" multiple accept="image/*" capture>
        
        <div class="advanced-panel">
            <div class="panel-title">⚙️ PROFESSIONAL CONTROLS</div>
            <div class="controls-grid">
                <div class="control-group">
                    <label>📄 Page Size</label>
                    <select id="pageSize">
                        <option value="image">Match Image Size (Best)</option>
                        <option value="a4">A4 (210 x 297mm)</option>
                        <option value="a3">A3 (297 x 420mm)</option>
                        <option value="letter">Letter (8.5 x 11in)</option>
                        <option value="legal">Legal (8.5 x 14in)</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label>🎨 Quality Setting</label>
                    <select id="qualityMode">
                        <option value="maximum">Maximum (100% - Best Quality)</option>
                        <option value="high">High (95% - Excellent)</option>
                        <option value="professional">Professional (90% - Recommended)</option>
                        <option value="standard">Standard (80% - Good)</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label>📐 DPI Setting</label>
                    <select id="dpiSetting">
                        <option value="300">300 DPI (Professional Print)</option>
                        <option value="200">200 DPI (Good Quality)</option>
                        <option value="150">150 DPI (Screen Quality)</option>
                        <option value="96">96 DPI (Web/Email)</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label>🔴 Watermark Text</label>
                    <input type="text" id="watermarkText" value="ourbook 911573334">
                    <div class="watermark-preview" id="watermarkPreview">🔴 ourbook 911573334</div>
                </div>
                
                <div class="control-group">
                    <label>🔖 Watermark Position</label>
                    <select id="watermarkPosition">
                        <option value="bottom-right">Bottom Right</option>
                        <option value="bottom-left">Bottom Left</option>
                        <option value="top-right">Top Right</option>
                        <option value="top-left">Top Left</option>
                        <option value="center">Center</option>
                        <option value="none">No Watermark</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label>🎯 Color Profile</label>
                    <select id="colorProfile">
                        <option value="rgb">RGB (Standard)</option>
                        <option value="cmyk">CMYK (Print Ready)</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div class="preview-grid" id="preview"></div>
        
        <div class="button-group">
            <button class="clear-btn" id="clearBtn">Clear All 🗑️</button>
            <button id="convertBtn">✨ Create Professional PDF</button>
        </div>
        
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill">0%</div>
        </div>
        
        <div class="status" id="status"></div>
        <div class="file-info" id="fileInfo"></div>
        
        <!-- YOUR LINK ADDED HERE -->
        <div class="footer">
            <a href="https://addispower.pages.dev/" target="_blank">🌐 Addis Power</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        let selectedFiles = [];
        
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewGrid = document.getElementById('preview');
        const convertBtn = document.getElementById('convertBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusDiv = document.getElementById('status');
        const fileInfo = document.getElementById('fileInfo');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const pageSizeSelect = document.getElementById('pageSize');
        const qualityModeSelect = document.getElementById('qualityMode');
        const dpiSettingSelect = document.getElementById('dpiSetting');
        const watermarkTextInput = document.getElementById('watermarkText');
        const watermarkPositionSelect = document.getElementById('watermarkPosition');
        
        const qualityMap = {
            maximum: 1.0,
            high: 0.95,
            professional: 0.9,
            standard: 0.8
        };
        
        const pageSizes = {
            a4: { width: 595, height: 842, name: 'a4' },
            a3: { width: 842, height: 1191, name: 'a3' },
            letter: { width: 612, height: 792, name: 'letter' },
            legal: { width: 612, height: 1008, name: 'legal' }
        };
        
        watermarkTextInput.addEventListener('input', () => {
            document.getElementById('watermarkPreview').innerHTML = `🔴 ${watermarkTextInput.value || 'ourbook 911573334'}`;
        });
        
        uploadArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFiles(Array.from(e.target.files)));
        clearBtn.addEventListener('click', clearAll);
        convertBtn.addEventListener('click', convertToPDF);
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#e8e8ff';
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.background = '#fafafa';
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#fafafa';
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
            handleFiles(files);
        });
        
        function handleFiles(files) {
            if (files.length === 0) return;
            const imageFiles = files.filter(f => f.type.startsWith('image/'));
            if (imageFiles.length === 0) {
                showStatus('Please select images', 'error');
                return;
            }
            imageFiles.forEach(file => {
                if (!selectedFiles.some(existing => existing.name === file.name && existing.size === file.size)) {
                    selectedFiles.push(file);
                }
            });
            updatePreview();
            updateFileInfo();
            showStatus(`Added ${imageFiles.length} image(s)`, 'success');
        }
        
        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updatePreview();
            updateFileInfo();
        }
        
        function clearAll() {
            if (selectedFiles.length > 0 && confirm('Clear all images?')) {
                selectedFiles = [];
                updatePreview();
                updateFileInfo();
                showStatus('Cleared', 'info');
            }
        }
        
        function updatePreview() {
            if (selectedFiles.length === 0) {
                previewGrid.innerHTML = '<div style="text-align: center; padding: 20px; color: #999;">No images selected</div>';
                return;
            }
            previewGrid.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const previewItem = document.createElement('div');
                previewItem.className = 'preview-item';
                const img = document.createElement('img');
                img.className = 'preview-img';
                img.src = URL.createObjectURL(file);
                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-btn';
                removeBtn.innerHTML = '×';
                removeBtn.onclick = () => removeFile(index);
                previewItem.appendChild(img);
                previewItem.appendChild(removeBtn);
                previewGrid.appendChild(previewItem);
            });
        }
        
        function updateFileInfo() {
            if (selectedFiles.length === 0) {
                fileInfo.textContent = 'No images';
                return;
            }
            const totalSize = selectedFiles.reduce((sum, file) => sum + file.size, 0);
            const sizeMB = (totalSize / (1024 * 1024)).toFixed(2);
            fileInfo.textContent = `📊 ${selectedFiles.length} image(s) | 💾 ${sizeMB} MB | DPI: ${dpiSettingSelect.value}`;
        }
        
        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type} show`;
            setTimeout(() => {
                statusDiv.classList.remove('show');
            }, 3000);
        }
        
        function updateProgress(percent, text) {
            progressBar.classList.add('show');
            progressFill.style.width = `${percent}%`;
            progressFill.textContent = text || `${percent}%`;
            if (percent >= 100) {
                setTimeout(() => {
                    progressBar.classList.remove('show');
                    progressFill.style.width = '0%';
                }, 1000);
            }
        }
        
        async function loadImageWithDPI(file, quality, targetDPI) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const currentDPI = 96;
                        const scale = targetDPI / currentDPI;
                        let width = img.width;
                        let height = img.height;
                        if (targetDPI > currentDPI) {
                            width = img.width * scale;
                            height = img.height * scale;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'high';
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        let outputQuality = quality;
                        let format = 'image/jpeg';
                        if (file.type === 'image/png' && quality >= 0.95) {
                            format = 'image/png';
                            outputQuality = undefined;
                        }
                        
                        canvas.toBlob((blob) => {
                            const finalReader = new FileReader();
                            finalReader.onloadend = () => resolve({
                                base64: finalReader.result,
                                width: width,
                                height: height
                            });
                            finalReader.readAsDataURL(blob);
                        }, format, outputQuality);
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
        
        function addWatermark(pdf, pageWidth, pageHeight, text, position) {
            if (!text || text.trim() === '' || position === 'none') return;
            const fontSize = Math.max(6, Math.min(10, pageWidth / 50));
            pdf.setFontSize(fontSize);
            pdf.setTextColor(255, 0, 0);
            pdf.setGState(new pdf.GState({ opacity: 0.35 }));
            const padding = 8;
            const textWidth = pdf.getTextWidth(text);
            let x, y;
            switch(position) {
                case 'bottom-right':
                    x = pageWidth - textWidth - padding;
                    y = pageHeight - padding;
                    break;
                case 'bottom-left':
                    x = padding;
                    y = pageHeight - padding;
                    break;
                case 'top-right':
                    x = pageWidth - textWidth - padding;
                    y = padding + 5;
                    break;
                case 'top-left':
                    x = padding;
                    y = padding + 5;
                    break;
                case 'center':
                    x = (pageWidth - textWidth) / 2;
                    y = pageHeight / 2;
                    break;
                default:
                    return;
            }
            pdf.text(text, x, y);
        }
        
        async function convertToPDF() {
            if (selectedFiles.length === 0) {
                showStatus('Select images first', 'error');
                return;
            }
            convertBtn.disabled = true;
            showStatus('Creating professional PDF...', 'info');
            try {
                const { jsPDF } = jspdf;
                let pdf = null;
                let isFirstPage = true;
                const quality = qualityMap[qualityModeSelect.value];
                const targetDPI = parseInt(dpiSettingSelect.value);
                const pageSizeValue = pageSizeSelect.value;
                const watermarkText = watermarkTextInput.value;
                const watermarkPos = watermarkPositionSelect.value;
                
                for (let i = 0; i < selectedFiles.length; i++) {
                    const file = selectedFiles[i];
                    const progressPercent = Math.round((i / selectedFiles.length) * 100);
                    updateProgress(progressPercent, `Processing ${i+1}/${selectedFiles.length} at ${targetDPI} DPI`);
                    
                    const processed = await loadImageWithDPI(file, quality, targetDPI);
                    
                    let pdfWidth, pdfHeight, imgWidth, imgHeight, x, y;
                    
                    if (pageSizeValue === 'image') {
                        const pxToPoints = 72 / targetDPI;
                        pdfWidth = processed.width * pxToPoints;
                        pdfHeight = processed.height * pxToPoints;
                        imgWidth = pdfWidth;
                        imgHeight = pdfHeight;
                        x = 0;
                        y = 0;
                        if (isFirstPage) {
                            pdf = new jsPDF({ unit: 'pt', format: [pdfWidth, pdfHeight], compress: false });
                            isFirstPage = false;
                        } else {
                            pdf.addPage([pdfWidth, pdfHeight], 'pt');
                        }
                    } else {
                        const size = pageSizes[pageSizeValue];
                        pdfWidth = size.width;
                        pdfHeight = size.height;
                        const imgAspect = processed.width / processed.height;
                        const pageAspect = pdfWidth / pdfHeight;
                        if (imgAspect > pageAspect) {
                            imgWidth = pdfWidth;
                            imgHeight = pdfWidth / imgAspect;
                            x = 0;
                            y = (pdfHeight - imgHeight) / 2;
                        } else {
                            imgHeight = pdfHeight;
                            imgWidth = pdfHeight * imgAspect;
                            x = (pdfWidth - imgWidth) / 2;
                            y = 0;
                        }
                        if (isFirstPage) {
                            pdf = new jsPDF({ unit: 'pt', format: size.name, compress: false });
                            isFirstPage = false;
                        } else {
                            pdf.addPage(size.name, 'pt');
                        }
                    }
                    
                    const format = file.type === 'image/png' ? 'PNG' : 'JPEG';
                    pdf.addImage(processed.base64, format, x, y, imgWidth, imgHeight);
                    addWatermark(pdf, pdfWidth, pdfHeight, watermarkText, watermarkPos);
                }
                
                updateProgress(100, 'Complete!');
                const timestamp = new Date().getTime();
                const filename = `addispower-pdf-${timestamp}.pdf`;
                pdf.save(filename);
                
                const totalSize = selectedFiles.reduce((sum, file) => sum + file.size, 0);
                const sizeMB = (totalSize / (1024 * 1024)).toFixed(2);
                showStatus(`✅ PDF Saved! ${selectedFiles.length} images | ${sizeMB}MB | ${targetDPI} DPI | ${watermarkText}`, 'success');
                
            } catch (error) {
                showStatus('Error: ' + error.message, 'error');
            } finally {
                convertBtn.disabled = false;
                setTimeout(() => progressBar.classList.remove('show'), 1000);
            }
        }
    </script>
</body>
</html>
