<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to PDF Converter - With Compression & Watermark</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #28a745;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fafafa;
        }

        .upload-area:hover {
            background: #f0f0ff;
            border-color: #764ba2;
        }

        .upload-area.drag-over {
            background: #e8e8ff;
            border-color: #764ba2;
        }

        #fileInput {
            display: none;
        }

        .mode-selector {
            margin: 20px 0;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 10px;
            text-align: center;
        }

        .mode-btn {
            padding: 10px 20px;
            margin: 0 5px;
            border: 2px solid #667eea;
            background: white;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .settings-panel {
            margin: 20px 0;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .setting-item {
            flex: 1;
            min-width: 200px;
        }

        .setting-item label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .setting-item input, .setting-item select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .watermark-preview {
            margin-top: 10px;
            font-size: 12px;
            color: #666;
            font-style: italic;
        }

        .quality-value {
            display: inline-block;
            margin-left: 10px;
            color: #667eea;
            font-weight: bold;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
            max-height: 500px;
            overflow-y: auto;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 10px;
        }

        .preview-item {
            position: relative;
            border: 2px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background: white;
            transition: transform 0.2s;
        }

        .preview-item:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .preview-img {
            width: 100%;
            height: 150px;
            object-fit: contain;
            background: #f0f0f0;
        }

        .preview-info {
            padding: 5px;
            font-size: 11px;
            text-align: center;
            background: #f0f0f0;
        }

        .remove-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: red;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .clear-btn {
            background: linear-gradient(135deg, #f56565 0%, #c53030 100%);
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #c6f6d5;
            color: #22543d;
        }

        .status.error {
            background: #fed7d7;
            color: #742a2a;
        }

        .status.info {
            background: #bee3f8;
            color: #2c5282;
        }

        .file-info {
            text-align: center;
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 10px;
            display: none;
        }

        .progress-bar.show {
            display: block;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #28a745 0%, #20c997 100%);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .size-comparison {
            margin-top: 10px;
            font-size: 12px;
            text-align: center;
            color: #666;
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            
            .preview-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
            
            .preview-img {
                height: 100px;
            }
            
            .settings-panel {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Image to PDF Converter</h1>
        <div class="subtitle">✅ Compression + Watermark | Smaller PDF Files</div>
        
        <div class="upload-area" id="uploadArea">
            <p>📁 Click or Drag & Drop Images Here</p>
            <small>Compressed PDF = Smaller file size | Watermark included</small>
        </div>
        
        <input type="file" id="fileInput" multiple accept="image/*">
        
        <div class="mode-selector">
            <strong>📄 PDF Page Size:</strong><br><br>
            <button class="mode-btn active" data-mode="image">🎯 MATCH IMAGE SIZE</button>
            <button class="mode-btn" data-mode="a4">📄 A4 Paper</button>
            <button class="mode-btn" data-mode="letter">📄 Letter Paper</button>
        </div>

        <div class="settings-panel">
            <div class="setting-item">
                <label>📦 Compression Quality:</label>
                <input type="range" id="compression" min="0.3" max="1" step="0.01" value="0.7">
                <span class="quality-value" id="qualityValue">70%</span>
                <div class="size-comparison">Lower = Smaller file | Higher = Better quality</div>
            </div>
            
            <div class="setting-item">
                <label>💧 Watermark Settings:</label>
                <select id="watermarkPosition">
                    <option value="bottom-right">Bottom Right</option>
                    <option value="bottom-left">Bottom Left</option>
                    <option value="top-right">Top Right</option>
                    <option value="top-left">Top Left</option>
                    <option value="center">Center</option>
                </select>
                <div class="watermark-preview">🔖 Watermark: <strong>ourbook 911573334</strong></div>
            </div>
        </div>
        
        <div class="preview-grid" id="preview"></div>
        
        <div class="button-group">
            <button class="clear-btn" id="clearBtn">Clear All 🗑️</button>
            <button id="convertBtn">Convert to PDF 📄</button>
        </div>
        
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill">0%</div>
        </div>
        
        <div class="status" id="status"></div>
        <div class="file-info" id="fileInfo"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        let selectedFiles = [];
        let currentMode = 'image';
        
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewGrid = document.getElementById('preview');
        const convertBtn = document.getElementById('convertBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusDiv = document.getElementById('status');
        const fileInfo = document.getElementById('fileInfo');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const compressionSlider = document.getElementById('compression');
        const qualityValue = document.getElementById('qualityValue');
        const watermarkPosition = document.getElementById('watermarkPosition');
        
        // Compression quality display
        compressionSlider.addEventListener('input', () => {
            const value = Math.round(compressionSlider.value * 100);
            qualityValue.textContent = `${value}%`;
        });
        
        // Mode selection
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
                showStatus(`Mode: ${btn.textContent}`, 'info');
            });
        });
        
        uploadArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFiles(Array.from(e.target.files)));
        clearBtn.addEventListener('click', clearAll);
        convertBtn.addEventListener('click', convertToPDF);
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
            handleFiles(files);
        });
        
        function handleFiles(files) {
            if (files.length === 0) return;
            
            const imageFiles = files.filter(f => f.type.startsWith('image/'));
            
            if (imageFiles.length === 0) {
                showStatus('Please select valid image files', 'error');
                return;
            }
            
            imageFiles.forEach(file => {
                if (!selectedFiles.some(existing => existing.name === file.name && existing.size === file.size)) {
                    selectedFiles.push(file);
                }
            });
            
            updatePreview();
            updateFileInfo();
            showStatus(`Added ${imageFiles.length} image(s)`, 'success');
        }
        
        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updatePreview();
            updateFileInfo();
        }
        
        function clearAll() {
            if (selectedFiles.length > 0 && confirm(`Clear all ${selectedFiles.length} images?`)) {
                selectedFiles = [];
                updatePreview();
                updateFileInfo();
                showStatus('All images cleared', 'info');
            }
        }
        
        function updatePreview() {
            if (selectedFiles.length === 0) {
                previewGrid.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">No images selected. Upload your images here!</div>';
                return;
            }
            
            previewGrid.innerHTML = '';
            
            selectedFiles.forEach((file, index) => {
                const previewItem = document.createElement('div');
                previewItem.className = 'preview-item';
                
                const img = document.createElement('img');
                img.className = 'preview-img';
                img.src = URL.createObjectURL(file);
                
                const info = document.createElement('div');
                info.className = 'preview-info';
                const sizeKB = (file.size / 1024).toFixed(1);
                info.textContent = `${file.name.substring(0, 15)}${file.name.length > 15 ? '...' : ''} (${sizeKB}KB)`;
                
                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-btn';
                removeBtn.innerHTML = '×';
                removeBtn.onclick = () => removeFile(index);
                
                previewItem.appendChild(img);
                previewItem.appendChild(info);
                previewItem.appendChild(removeBtn);
                previewGrid.appendChild(previewItem);
            });
        }
        
        function updateFileInfo() {
            if (selectedFiles.length === 0) {
                fileInfo.textContent = 'No images selected';
                return;
            }
            
            const totalSize = selectedFiles.reduce((sum, file) => sum + file.size, 0);
            const sizeMB = (totalSize / (1024 * 1024)).toFixed(2);
            fileInfo.textContent = `📊 ${selectedFiles.length} image(s) | 💾 Original: ${sizeMB} MB | Mode: ${currentMode.toUpperCase()}`;
        }
        
        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type} show`;
            setTimeout(() => {
                statusDiv.classList.remove('show');
            }, 3000);
        }
        
        function updateProgress(percent, text) {
            progressBar.classList.add('show');
            progressFill.style.width = `${percent}%`;
            progressFill.textContent = text || `${percent}%`;
            
            if (percent >= 100) {
                setTimeout(() => {
                    progressBar.classList.remove('show');
                    progressFill.style.width = '0%';
                }, 1000);
            }
        }
        
        function fileToBase64(file, quality) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    if (file.type === 'image/jpeg' && quality < 1) {
                        // Compress JPEG images
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            canvas.width = img.width;
                            canvas.height = img.height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0);
                            canvas.toBlob((blob) => {
                                const compressedReader = new FileReader();
                                compressedReader.onloadend = () => resolve(compressedReader.result);
                                compressedReader.readAsDataURL(blob);
                            }, 'image/jpeg', quality);
                        };
                        img.src = e.target.result;
                    } else {
                        resolve(e.target.result);
                    }
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
        
        function loadImage(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = src;
            });
        }
        
        function addWatermark(pdf, pageWidth, pageHeight, position) {
            const watermarkText = 'ourbook 911573334';
            const fontSize = pageWidth / 15; // Responsive font size
            pdf.setFontSize(fontSize);
            pdf.setTextColor(150, 150, 150); // Light gray
            pdf.setGState(new pdf.GState({ opacity: 0.3 })); // 30% transparent
            
            let x, y;
            const textWidth = pdf.getTextWidth(watermarkText);
            
            switch(position) {
                case 'bottom-right':
                    x = pageWidth - textWidth - 10;
                    y = pageHeight - 15;
                    break;
                case 'bottom-left':
                    x = 10;
                    y = pageHeight - 15;
                    break;
                case 'top-right':
                    x = pageWidth - textWidth - 10;
                    y = 20;
                    break;
                case 'top-left':
                    x = 10;
                    y = 20;
                    break;
                case 'center':
                    x = (pageWidth - textWidth) / 2;
                    y = pageHeight / 2;
                    break;
                default:
                    x = pageWidth - textWidth - 10;
                    y = pageHeight - 15;
            }
            
            pdf.text(watermarkText, x, y);
        }
        
        async function convertToPDF() {
            if (selectedFiles.length === 0) {
                showStatus('❌ Please select images first', 'error');
                return;
            }
            
            convertBtn.disabled = true;
            showStatus('🔄 Converting with compression and watermark...', 'info');
            
            try {
                const { jsPDF } = jspdf;
                let pdf = null;
                let isFirstPage = true;
                const compressionQuality = parseFloat(compressionSlider.value);
                const watermarkPos = watermarkPosition.value;
                
                let originalSize = 0;
                let compressedSize = 0;
                
                for (let i = 0; i < selectedFiles.length; i++) {
                    const file = selectedFiles[i];
                    originalSize += file.size;
                    
                    const progressPercent = Math.round((i / selectedFiles.length) * 100);
                    updateProgress(progressPercent, `Processing ${i+1}/${selectedFiles.length}`);
                    
                    // Compress if quality is less than 100%
                    const base64 = await fileToBase64(file, compressionQuality);
                    const img = await loadImage(base64);
                    
                    // Calculate compressed size
                    const base64Size = Math.round((base64.length * 3) / 4);
                    compressedSize += base64Size;
                    
                    let pdfWidth, pdfHeight, imgWidth, imgHeight, x, y;
                    
                    if (currentMode === 'image') {
                        const pxToPoints = 72 / 96;
                        pdfWidth = img.width * pxToPoints;
                        pdfHeight = img.height * pxToPoints;
                        imgWidth = pdfWidth;
                        imgHeight = pdfHeight;
                        x = 0;
                        y = 0;
                        
                        if (isFirstPage) {
                            pdf = new jsPDF({
                                unit: 'pt',
                                format: [pdfWidth, pdfHeight],
                                compress: true
                            });
                            isFirstPage = false;
                        } else {
                            pdf.addPage([pdfWidth, pdfHeight], 'pt');
                        }
                        
                    } else if (currentMode === 'a4') {
                        pdfWidth = 595;
                        pdfHeight = 842;
                        const imgAspect = img.width / img.height;
                        const pageAspect = pdfWidth / pdfHeight;
                        
                        if (imgAspect > pageAspect) {
                            imgWidth = pdfWidth;
                            imgHeight = pdfWidth / imgAspect;
                            x = 0;
                            y = (pdfHeight - imgHeight) / 2;
                        } else {
                            imgHeight = pdfHeight;
                            imgWidth = pdfHeight * imgAspect;
                            x = (pdfWidth - imgWidth) / 2;
                            y = 0;
                        }
                        
                        if (isFirstPage) {
                            pdf = new jsPDF({
                                unit: 'pt',
                                format: 'a4',
                                compress: true
                            });
                            isFirstPage = false;
                        } else {
                            pdf.addPage('a4', 'pt');
                        }
                        
                    } else if (currentMode === 'letter') {
                        pdfWidth = 612;
                        pdfHeight = 792;
                        const imgAspect = img.width / img.height;
                        const pageAspect = pdfWidth / pdfHeight;
                        
                        if (imgAspect > pageAspect) {
                            imgWidth = pdfWidth;
                            imgHeight = pdfWidth / imgAspect;
                            x = 0;
                            y = (pdfHeight - imgHeight) / 2;
                        } else {
                            imgHeight = pdfHeight;
                            imgWidth = pdfHeight * imgAspect;
                            x = (pdfWidth - imgWidth) / 2;
                            y = 0;
                        }
                        
                        if (isFirstPage) {
                            pdf = new jsPDF({
                                unit: 'pt',
                                format: 'letter',
                                compress: true
                            });
                            isFirstPage = false;
                        } else {
                            pdf.addPage('letter', 'pt');
                        }
                    }
                    
                    const format = file.type === 'image/png' ? 'PNG' : 'JPEG';
                    pdf.addImage(base64, format, x, y, imgWidth, imgHeight, undefined, 'FAST');
                    
                    // Add watermark
                    addWatermark(pdf, pdfWidth, pdfHeight, watermarkPos);
                }
                
                updateProgress(100, 'Complete!');
                
                const timestamp = new Date().getTime();
                const filename = `ourbook-pdf-${timestamp}.pdf`;
                pdf.save(filename);
                
                const originalMB = (originalSize / (1024 * 1024)).toFixed(2);
                const compressedMB = (compressedSize / (1024 * 1024)).toFixed(2);
                const savedPercent = ((1 - compressedSize/originalSize) * 100).toFixed(0);
                
                showStatus(`✅ Success! ${selectedFiles.length} images → PDF | Original: ${originalMB}MB | Compressed: ${compressedMB}MB | Saved: ${savedPercent}% | Watermark: ourbook 911573334`, 'success');
                
            } catch (error) {
                console.error('Error:', error);
                showStatus(`❌ Error: ${error.message}. Try with fewer or smaller images.`, 'error');
            } finally {
                convertBtn.disabled = false;
                setTimeout(() => {
                    progressBar.classList.remove('show');
                }, 2000);
            }
        }
    </script>
</body>
</html>
