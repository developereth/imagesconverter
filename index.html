<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to PDF Converter - No Cropping, Perfect Fit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fafafa;
        }

        .upload-area:hover {
            background: #f0f0ff;
            border-color: #764ba2;
        }

        .upload-area.drag-over {
            background: #e8e8ff;
            border-color: #764ba2;
        }

        #fileInput {
            display: none;
        }

        .controls-top {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .settings {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .settings label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        select, input {
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
            cursor: pointer;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
            max-height: 500px;
            overflow-y: auto;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 10px;
        }

        .preview-item {
            position: relative;
            border: 2px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background: white;
            transition: transform 0.2s;
        }

        .preview-item:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .preview-img {
            width: 100%;
            height: 150px;
            object-fit: contain;
            background: #f0f0f0;
        }

        .preview-info {
            padding: 5px;
            font-size: 11px;
            text-align: center;
            background: #f0f0f0;
            word-break: break-all;
        }

        .remove-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: red;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .remove-btn:hover {
            background: darkred;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .clear-btn {
            background: linear-gradient(135deg, #f56565 0%, #c53030 100%);
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            font-weight: 500;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }

        .status.error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #fc8181;
        }

        .status.info {
            background: #bee3f8;
            color: #2c5282;
            border: 1px solid #90cdf4;
        }

        .file-info {
            text-align: center;
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 10px;
            display: none;
        }

        .progress-bar.show {
            display: block;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            
            .preview-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
            
            .preview-img {
                height: 100px;
            }
            
            .settings {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Image to PDF Converter</h1>
        <div class="subtitle">No Cropping • Perfect Fit • 100% Private</div>
        
        <div class="upload-area" id="uploadArea">
            <p>📁 Click or Drag & Drop Images Here</p>
            <small>Supports JPG, PNG, GIF, WebP, BMP • Multiple files allowed</small>
        </div>
        
        <input type="file" id="fileInput" multiple accept="image/jpeg,image/png,image/gif,image/webp,image/bmp">
        
        <div class="controls-top">
            <div class="settings">
                <label>
                    📄 Page Size:
                    <select id="pageSize">
                        <option value="a4">A4 (210x297mm)</option>
                        <option value="letter">Letter (8.5x11in)</option>
                        <option value="legal">Legal (8.5x14in)</option>
                    </select>
                </label>
                <label>
                    🎨 Image Fit:
                    <select id="imageFit">
                        <option value="fit">Fit to Page (No Cropping)</option>
                        <option value="original">Original Size</option>
                        <option value="contain">Contain with Background</option>
                    </select>
                </label>
            </div>
            <button class="clear-btn" id="clearBtn">Clear All 🗑️</button>
        </div>
        
        <div class="preview-grid" id="preview"></div>
        
        <div class="button-group">
            <button id="convertBtn">Convert to PDF 📄</button>
        </div>
        
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill">0%</div>
        </div>
        
        <div class="status" id="status"></div>
        <div class="file-info" id="fileInfo"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        // Global variables
        let selectedFiles = [];
        
        // DOM elements
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewGrid = document.getElementById('preview');
        const convertBtn = document.getElementById('convertBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusDiv = document.getElementById('status');
        const fileInfo = document.getElementById('fileInfo');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const pageSizeSelect = document.getElementById('pageSize');
        const imageFitSelect = document.getElementById('imageFit');
        
        // Page sizes in mm
        const pageSizes = {
            a4: { width: 210, height: 297 },
            letter: { width: 215.9, height: 279.4 },
            legal: { width: 215.9, height: 355.6 }
        };
        
        // Event listeners
        uploadArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFiles(Array.from(e.target.files)));
        clearBtn.addEventListener('click', clearAll);
        convertBtn.addEventListener('click', convertToPDF);
        
        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
            handleFiles(files);
        });
        
        function handleFiles(files) {
            if (files.length === 0) return;
            
            // Filter only image files
            const imageFiles = files.filter(f => f.type.startsWith('image/'));
            
            if (imageFiles.length === 0) {
                showStatus('Please select valid image files', 'error');
                return;
            }
            
            // Add new files
            imageFiles.forEach(file => {
                if (!selectedFiles.some(existing => existing.name === file.name && existing.size === file.size)) {
                    selectedFiles.push(file);
                }
            });
            
            updatePreview();
            updateFileInfo();
            showStatus(`Added ${imageFiles.length} image(s)`, 'success');
        }
        
        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updatePreview();
            updateFileInfo();
            showStatus('Image removed', 'info');
        }
        
        function clearAll() {
            if (selectedFiles.length > 0 && confirm(`Clear all ${selectedFiles.length} images?`)) {
                selectedFiles = [];
                updatePreview();
                updateFileInfo();
                showStatus('All images cleared', 'info');
            }
        }
        
        function updatePreview() {
            if (selectedFiles.length === 0) {
                previewGrid.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">No images selected. Upload some images to get started!</div>';
                return;
            }
            
            previewGrid.innerHTML = '';
            
            selectedFiles.forEach((file, index) => {
                const previewItem = document.createElement('div');
                previewItem.className = 'preview-item';
                
                const img = document.createElement('img');
                img.className = 'preview-img';
                img.src = URL.createObjectURL(file);
                
                const info = document.createElement('div');
                info.className = 'preview-info';
                const sizeKB = (file.size / 1024).toFixed(1);
                info.textContent = `${file.name.substring(0, 15)}${file.name.length > 15 ? '...' : ''} (${sizeKB}KB)`;
                
                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-btn';
                removeBtn.innerHTML = '×';
                removeBtn.onclick = (e) => {
                    e.stopPropagation();
                    removeFile(index);
                };
                
                previewItem.appendChild(img);
                previewItem.appendChild(info);
                previewItem.appendChild(removeBtn);
                previewGrid.appendChild(previewItem);
            });
        }
        
        function updateFileInfo() {
            if (selectedFiles.length === 0) {
                fileInfo.textContent = 'No images selected';
                return;
            }
            
            const totalSize = selectedFiles.reduce((sum, file) => sum + file.size, 0);
            const sizeMB = (totalSize / (1024 * 1024)).toFixed(2);
            fileInfo.textContent = `📊 ${selectedFiles.length} image(s) | 💾 Total: ${sizeMB} MB`;
        }
        
        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type} show`;
            
            setTimeout(() => {
                if (statusDiv.className.includes(type)) {
                    statusDiv.classList.remove('show');
                }
            }, 3000);
        }
        
        function updateProgress(percent, text) {
            progressBar.classList.add('show');
            progressFill.style.width = `${percent}%`;
            progressFill.textContent = text || `${percent}%`;
            
            if (percent >= 100) {
                setTimeout(() => {
                    progressBar.classList.remove('show');
                    progressFill.style.width = '0%';
                }, 1000);
            }
        }
        
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
        
        function loadImage(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = src;
            });
        }
        
        async function convertToPDF() {
            if (selectedFiles.length === 0) {
                showStatus('❌ Please select images first', 'error');
                return;
            }
            
            convertBtn.disabled = true;
            showStatus('🔄 Converting images to PDF. Please wait...', 'info');
            
            try {
                const { jsPDF } = jspdf;
                const pageSize = pageSizes[pageSizeSelect.value];
                const imageFit = imageFitSelect.value;
                
                let pdf = null;
                let isFirstPage = true;
                
                for (let i = 0; i < selectedFiles.length; i++) {
                    const file = selectedFiles[i];
                    
                    // Update progress
                    const progressPercent = Math.round((i / selectedFiles.length) * 100);
                    updateProgress(progressPercent, `Processing ${i+1}/${selectedFiles.length}`);
                    
                    // Convert to base64
                    const base64 = await fileToBase64(file);
                    
                    // Load image to get dimensions
                    const img = await loadImage(base64);
                    
                    // Calculate dimensions to fit WITHOUT cropping
                    let imgWidth, imgHeight, x, y;
                    
                    if (imageFit === 'original') {
                        // Convert pixels to mm (assuming 96 DPI)
                        const pxToMm = 25.4 / 96;
                        imgWidth = img.width * pxToMm;
                        imgHeight = img.height * pxToMm;
                        
                        // Scale down if larger than page
                        if (imgWidth > pageSize.width) {
                            const ratio = pageSize.width / imgWidth;
                            imgWidth = pageSize.width;
                            imgHeight = imgHeight * ratio;
                        }
                        if (imgHeight > pageSize.height) {
                            const ratio = pageSize.height / imgHeight;
                            imgHeight = pageSize.height;
                            imgWidth = imgWidth * ratio;
                        }
                        
                        // Center the image
                        x = (pageSize.width - imgWidth) / 2;
                        y = (pageSize.height - imgHeight) / 2;
                        
                    } else if (imageFit === 'contain') {
                        // Contain with background (maintain aspect ratio, add white background)
                        const ratio = Math.min(pageSize.width / img.width, pageSize.height / img.height);
                        imgWidth = img.width * ratio;
                        imgHeight = img.height * ratio;
                        
                        // Center the image
                        x = (pageSize.width - imgWidth) / 2;
                        y = (pageSize.height - imgHeight) / 2;
                        
                    } else {
                        // FIT TO PAGE - Maintain aspect ratio, no cropping
                        const imgAspect = img.width / img.height;
                        const pageAspect = pageSize.width / pageSize.height;
                        
                        if (imgAspect > pageAspect) {
                            // Image is wider - fit to width
                            imgWidth = pageSize.width;
                            imgHeight = imgWidth / imgAspect;
                            x = 0;
                            y = (pageSize.height - imgHeight) / 2;
                        } else {
                            // Image is taller - fit to height
                            imgHeight = pageSize.height;
                            imgWidth = imgHeight * imgAspect;
                            x = (pageSize.width - imgWidth) / 2;
                            y = 0;
                        }
                    }
                    
                    // Create new page
                    if (isFirstPage) {
                        pdf = new jsPDF({
                            unit: 'mm',
                            format: pageSizeSelect.value,
                            compress: true
                        });
                        isFirstPage = false;
                    } else {
                        pdf.addPage();
                    }
                    
                    // Add image to PDF
                    if (imageFit === 'contain') {
                        // Add white background first
                        pdf.setFillColor(255, 255, 255);
                        pdf.rect(0, 0, pageSize.width, pageSize.height, 'F');
                    }
                    
                    // Add the image
                    pdf.addImage(base64, 'JPEG', x, y, imgWidth, imgHeight, undefined, 'FAST');
                }
                
                updateProgress(100, 'Complete!');
                
                // Generate filename with date
                const now = new Date();
                const timestamp = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}_${now.getHours()}-${now.getMinutes()}-${now.getSeconds()}`;
                const filename = `images-to-pdf-${timestamp}.pdf`;
                
                // Save the PDF
                pdf.save(filename);
                
                showStatus(`✅ Success! Converted ${selectedFiles.length} image(s) to PDF. File: ${filename}`, 'success');
                
            } catch (error) {
                console.error('Conversion error:', error);
                showStatus(`❌ Error: ${error.message}. Try with fewer or smaller images.`, 'error');
            } finally {
                convertBtn.disabled = false;
                setTimeout(() => {
                    progressBar.classList.remove('show');
                }, 2000);
            }
        }
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && selectedFiles.length > 0) {
                clearAll();
            }
            if (e.key === 'Enter' && e.ctrlKey && selectedFiles.length > 0) {
                convertToPDF();
            }
        });
        
        // Initial message
        console.log('Image to PDF Converter ready - No cropping guaranteed!');
    </script>
</body>
</html>
