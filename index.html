<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to PDF Converter - Free Online Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fafafa;
        }

        .upload-area:hover {
            background: #f0f0ff;
            border-color: #764ba2;
        }

        .upload-area.drag-over {
            background: #e8e8ff;
            border-color: #764ba2;
        }

        #fileInput {
            display: none;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin: 20px 0;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }

        .preview-item {
            position: relative;
            border: 2px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background: #f9f9f9;
            transition: transform 0.2s;
        }

        .preview-item:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .preview-img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }

        .remove-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: red;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .remove-btn:hover {
            background: darkred;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .clear-btn {
            background: linear-gradient(135deg, #f56565 0%, #c53030 100%);
        }

        .status {
            margin-top: 20px;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            font-weight: 500;
        }

        .status.success {
            background: #c6f6d5;
            color: #22543d;
        }

        .status.error {
            background: #fed7d7;
            color: #742a2a;
        }

        .status.info {
            background: #bee3f8;
            color: #2c5282;
        }

        .file-info {
            text-align: center;
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            
            .preview-grid {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            }
            
            .preview-img {
                height: 80px;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>🖼️ Image to PDF Converter</h1>
        <div class="subtitle">Free, private, and works entirely in your browser</div>
        
        <div class="upload-area" id="uploadArea">
            <p>📁 Click or drag images here</p>
            <small>Supports JPG, PNG, GIF, WebP, BMP</small>
        </div>
        
        <input type="file" id="fileInput" multiple accept="image/*">
        
        <div class="preview-grid" id="preview"></div>
        
        <div class="controls">
            <button class="clear-btn" onclick="clearAll()">Clear All</button>
            <button id="convertBtn" onclick="convertToPDF()">Convert to PDF 📄</button>
        </div>
        
        <div class="status" id="status"></div>
        <div class="file-info" id="fileInfo"></div>
    </div>

    <script>
        let selectedFiles = [];
        
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewGrid = document.getElementById('preview');
        const convertBtn = document.getElementById('convertBtn');
        const statusDiv = document.getElementById('status');
        const fileInfo = document.getElementById('fileInfo');
        
        // Click to upload
        uploadArea.addEventListener('click', () => fileInput.click());
        
        // File selection
        fileInput.addEventListener('change', (e) => {
            handleFiles(Array.from(e.target.files));
        });
        
        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
            handleFiles(files);
        });
        
        function handleFiles(files) {
            if (files.length === 0) return;
            
            // Add new files to existing ones
            const newFiles = files.filter(file => !selectedFiles.some(existing => existing.name === file.name && existing.size === file.size));
            selectedFiles = [...selectedFiles, ...newFiles];
            
            updatePreview();
            updateFileInfo();
        }
        
        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updatePreview();
            updateFileInfo();
        }
        
        function updatePreview() {
            previewGrid.innerHTML = '';
            
            if (selectedFiles.length === 0) {
                previewGrid.style.display = 'none';
                return;
            }
            
            previewGrid.style.display = 'grid';
            
            selectedFiles.forEach((file, index) => {
                const previewItem = document.createElement('div');
                previewItem.className = 'preview-item';
                
                const img = document.createElement('img');
                img.className = 'preview-img';
                img.src = URL.createObjectURL(file);
                
                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-btn';
                removeBtn.innerHTML = '×';
                removeBtn.onclick = () => removeFile(index);
                
                previewItem.appendChild(img);
                previewItem.appendChild(removeBtn);
                previewGrid.appendChild(previewItem);
            });
        }
        
        function updateFileInfo() {
            const totalSize = selectedFiles.reduce((sum, file) => sum + file.size, 0);
            const sizeMB = (totalSize / (1024 * 1024)).toFixed(2);
            fileInfo.textContent = `${selectedFiles.length} image(s) | Total size: ${sizeMB} MB`;
        }
        
        function clearAll() {
            if (selectedFiles.length > 0 && confirm('Clear all images?')) {
                selectedFiles = [];
                updatePreview();
                updateFileInfo();
                statusDiv.innerHTML = '';
                statusDiv.className = 'status';
            }
        }
        
        async function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
        
        async function convertToPDF() {
            if (selectedFiles.length === 0) {
                showStatus('Please select images first', 'error');
                return;
            }
            
            convertBtn.disabled = true;
            showStatus('Converting... Please wait ⏳', 'info');
            
            try {
                const { jsPDF } = jspdf;
                let pdf;
                let isFirstPage = true;
                
                for (let i = 0; i < selectedFiles.length; i++) {
                    const file = selectedFiles[i];
                    const base64 = await fileToBase64(file);
                    
                    // Create image object to get dimensions
                    const img = new Image();
                    await new Promise((resolve) => {
                        img.onload = resolve;
                        img.src = base64;
                    });
                    
                    // Calculate dimensions to fit PDF page
                    const pdfWidth = 210; // A4 width in mm
                    const pdfHeight = (img.height * pdfWidth) / img.width;
                    
                    if (isFirstPage) {
                        pdf = new jsPDF({
                            unit: 'mm',
                            format: 'a4'
                        });
                        isFirstPage = false;
                    } else {
                        pdf.addPage();
                    }
                    
                    // Add image to PDF
                    pdf.addImage(base64, 'JPEG', 0, 0, pdfWidth, Math.min(pdfHeight, 297), undefined, 'FAST');
                    
                    // Update progress
                    showStatus(`Converting... ${Math.round((i + 1) / selectedFiles.length * 100)}%`, 'info');
                }
                
                // Save the PDF
                pdf.save(`images-to-pdf-${Date.now()}.pdf`);
                showStatus(`✅ Success! Converted ${selectedFiles.length} image(s) to PDF`, 'success');
                
                // Optional: Clear files after successful conversion
                // setTimeout(() => clearAll(), 2000);
                
            } catch (error) {
                console.error(error);
                showStatus('❌ Error converting images. Please try again.', 'error');
            } finally {
                convertBtn.disabled = false;
            }
        }
        
        function showStatus(message, type) {
            statusDiv.innerHTML = message;
            statusDiv.className = `status ${type}`;
            
            if (type === 'success') {
                setTimeout(() => {
                    if (statusDiv.className === 'status success') {
                        statusDiv.innerHTML = '';
                        statusDiv.className = 'status';
                    }
                }, 3000);
            }
        }
        
        // Add keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && selectedFiles.length > 0) {
                clearAll();
            }
        });
    </script>
</body>
</html>
